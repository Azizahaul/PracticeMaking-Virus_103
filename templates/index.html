<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timeline App - Infected</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { transition: filter 0.5s ease; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">TimelineApp</a>
            <div class="navbar-nav ms-auto flex-row">
                <span class="navbar-text text-white me-3">Welcome, {{ user }}</span>
                <a class="nav-link text-white" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <form action="/create" method="post" class="d-flex">
                            <input name="content" class="form-control me-2" placeholder="Apa yang kamu pikirkan?" required>
                            <button type="submit" class="btn btn-success">Kirim</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h5>Timeline</h5></div>
            <ul class="list-group list-group-flush">
                {% for line in tl %}
                <li class="list-group-item">{{ line.content }}</li>
                {% else %}
                <li class="list-group-item text-center text-muted">Belum ada postingan.</li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <!-- VIRUS LOGIC: Alert -> Lock 5s -> Kick -->
    {% if session.get('virus') %}
    <script>
        // 1. Munculkan Peringatan
        alert("YOU HAVE BEEN INFECTED HAHAHA !!!");

        // 2. Kunci Layar
        document.body.style.pointerEvents = "none";
        document.body.style.cursor = "not-allowed";
        document.body.style.filter = "grayscale(100%) brightness(40%)";

        // 3. Tambahkan teks peringatan di tengah layar
        let warning = document.createElement("div");
        warning.style = "position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); color:red; font-size:3rem; font-weight:bold; z-index:9999; text-align:center;";
        warning.innerHTML = "SYSTEM INFECTED<br><span style='font-size:1.5rem'>LOCKING DOWN... (5s)</span>";
        document.body.appendChild(warning);

        // 4. Hitung mundur 5 detik lalu tendang keluar
        setTimeout(() => {
            window.location.href = "/logout";
        }, 5000);
    </script>
    {% set _ = session.pop('virus', None) %}
    {% endif %}
</body>
</html>
